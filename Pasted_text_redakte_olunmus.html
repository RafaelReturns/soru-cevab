    @keyframes sheetUp{from{transform:translateY(48px);opacity:0}to{transform:translateY(0);opacity:1}}
  
@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.08);}
}

</style>

    function progressPercent(){ const a = steps.filter(s => s.type !== 'intro' && s.type !== 'final').length; return Math.min((answers.length / a) * 100, 100); }
    function transition(next){ card.classList.add('fade-out'); setTimeout(() => { next(); card.classList.remove('fade-out'); }, 360); }
    function topBar(label){ return `<div class="top"><div class="top-row"><div class="badge">${label}</div><div class="badge">${Math.round(progressPercent())}%</div></div><div class="progress"><span style="width:${progressPercent()}%"></span></div></div>`; }
    function getLoveMessage(){ return loveMessages[Math.floor(Math.random()*loveMessages.length)]; }
    function renderLoveWidget(){ const msg = getLoveMessage(); return `<div class="love-widget"><div class="love-btn" data-love-toggle>❤</div><div class="love-box" id="loveBox"><div class="love-pocket"><div class="love-item">${msg}</div></div></div></div>`; }
    function ensureHeartLayer(){ let layer = card.querySelector('.floating-hearts'); if(!layer){ layer = document.createElement('div'); layer.className = 'floating-hearts'; card.appendChild(layer); } return layer; }
    function spawnHeart(){ const layer = ensureHeartLayer(); const heart = document.createElement('span'); heart.className = 'floating-heart'; heart.textContent = '❤'; heart.style.left = `${8 + Math.random()*84}%`; heart.style.animationDuration = `${4.6 + Math.random()*2.2}s`; heart.style.setProperty('--drift', `${-18 + Math.random()*36}px`); heart.style.fontSize = `${14 + Math.random()*10}px`; layer.appendChild(heart); setTimeout(()=>heart.remove(),7000); }
    function startHearts(){ stopHearts(); for(let i=0;i<5;i++) setTimeout(spawnHeart, i*220); heartTimer = setInterval(spawnHeart, 520); }
    function stopHearts(){ if(heartTimer){ clearInterval(heartTimer); heartTimer = null; } const layer = card.querySelector('.floating-hearts'); if(layer) layer.innerHTML = ''; }
    function closeMusicPopup(playAudio=false){ if(playAudio){ music.play().catch(()=>{}); } musicPopup.classList.add('hidden'); setTimeout(()=>{ musicPopup.style.display='none'; card.style.filter='blur(0px)'; card.style.transform='scale(1)'; },350); }
    function goNext(){ transition(()=>{ current++; render(); }); }

    async function sendResults(){ const mailState=document.getElementById('mailState'); const sendBtn=document.getElementById('sendBtn'); if(sending) return; try{ sending=true; if(sendBtn) sendBtn.disabled=true; mailState.textContent='Göndərilir...'; emailjs.init({ publicKey: EMAIL_CONFIG.publicKey }); await emailjs.send(EMAIL_CONFIG.serviceId, EMAIL_CONFIG.templateId, { to_email: EMAIL_CONFIG.ownerEmail, full_message: JSON.stringify(answers,null,2) }); mailState.textContent='Göndərildi ❤';

      setTimeout(() => {
        card.innerHTML = `
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:20px;">
            <div id="envelope" style="font-size:120px;cursor:pointer;animation:pulse 2s infinite;">✉️</div>
            <p style="margin-top:15px;color:rgba(255,255,255,.7);">Məktubu açmaq üçün zərfə toxun</p>
          </div>
        `;

        document.getElementById("envelope").onclick = () => {
          card.innerHTML = `
            <div style="padding:25px;display:flex;align-items:center;justify-content:center;height:100%;text-align:center;">
              <div style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:25px;line-height:1.9;font-size:16px;color:white;backdrop-filter:blur(12px);">
                Haley bu gun sennen danisanda elediyim sehf ucun uzr isteyirem.
                Bilmeden dediyim bir sey oldu. Soz verirem ki bir de ele bir sey etmeyeceyem.
                Hec vaxt isteyerek xetrine deymereM ve ya seni incitmerem.
                Bilmeden oldu. Bu mesaji sonradan elave etmisem.
                INSALLAH bagislayarsan ❤️
                <br><br><b>- S4CR3D</b>
              </div>
            </div>
          `;
        };
      }, 1500); }catch(e){ console.error(e); mailState.textContent='Göndərilmədi'; }finally{ sending=false; if(sendBtn) sendBtn.disabled=false; } }

    function render(){
      const step = steps[current];
      setTheme(step.theme);
      if (musicPopup.style.display !== 'none') { card.style.filter = 'blur(7px)'; card.style.transform = 'scale(.985)'; }

      if(step.type === 'intro'){
        card.innerHTML = `${renderLoveWidget()}${topBar('Başla')}<div class="hero"><div class="love-note">${getLoveMessage()}</div><h1>${step.title}</h1><p class="sub">${step.text}</p><div class="visual">${step.emoji}</div></div><div class="footer"><div class="hint">Bu hissi sakitcə yaşa.</div><button class="primary" id="startBtn" type="button">Başla</button></div>`;
        document.getElementById('startBtn').onclick = goNext;
        startHearts();
        return;
      }

      if(step.type === 'quiz' || step.type === 'choice'){
        const order = answers.length + 1;
        card.innerHTML = `${renderLoveWidget()}${topBar('Sual ' + order)}<div class="content"><div class="love-note">${getLoveMessage()}</div><h2 class="question">${step.question}</h2><div class="visual">${step.emoji}</div><div class="options">${step.options.map(o => `<button class="option" type="button">${o}</button>`).join('')}</div></div><div class="footer"><div class="hint">Bəzən bir seçim bir hissi açır.</div><button class="primary" id="nextBtn" type="button" disabled>Davam et</button></div>`;
        const opts=[...card.querySelectorAll('.option')]; const nextBtn=document.getElementById('nextBtn'); let sel=null;
        opts.forEach(el => el.onclick = () => { opts.forEach(x=>x.classList.remove('selected')); el.classList.add('selected'); sel = el.textContent; nextBtn.disabled = false; });
        nextBtn.onclick = () => { answers.push({q: step.question, a: sel}); goNext(); };
        startHearts();
        return;
      }

      if(step.type === 'text'){
        const order = answers.length + 1;
        card.innerHTML = `${renderLoveWidget()}${topBar('Sual ' + order)}<div class="content"><div class="love-note">${getLoveMessage()}</div><h2 class="question">${step.question}</h2><textarea id="txt" placeholder="${step.placeholder}"></textarea></div><div class="footer"><div class="hint">Ən həqiqi sözlər ən sakit anda yazılır.</div><button class="primary" id="nextBtn" type="button" disabled>Davam et</button></div>`;
        const txt=document.getElementById('txt'); const nextBtn=document.getElementById('nextBtn'); txt.oninput = () => { nextBtn.disabled = txt.value.trim().length < 2; }; nextBtn.onclick = () => { answers.push({q: step.question, a: txt.value}); goNext(); };
        startHearts();
        return;
      }

      if(step.type === 'final'){
        const lastText = [...answers].reverse().find(x => x.q && x.q.includes('ən həqiqi hissini yaz'))?.a || 'Bəzən ən dərin hisslər ən sakit cümlələrdə gizlənir.';
        card.innerHTML = `${renderLoveWidget()}${topBar('Son')}<div class="final cinema-scene"><div class="cinema-stars"></div><div class="cinema-hearts"><span class="cinema-heart">❤</span><span class="cinema-heart">❤</span><span class="cinema-heart">❤</span><span class="cinema-heart">❤</span><span class="cinema-heart">❤</span></div><div class="cinema-glow"></div><div class="eyebrow">Sənin üçün</div><h2 class="cinema-title">${step.title}</h2><p class="cinema-line">${step.text}</p><div class="cinema-quote">Bəzən bir insanın dəyəri onun haqqında danışanda yox, susanda içində nə qədər yer tutduğunda bilinir.<br><br>Bu balaca şeyin sonunda mənim yadımda qalacaq olan yalnız cavabların deyil... onları hansı hisslə yazdığın olacaq.</div><div class="summary-box">Sənin son cümlən:\n\n${lastText}</div><div class="mail-state" id="mailState">Hazırdır</div></div><div class="footer"><div class="hint">Bu son səhnə bir xatirə kimi qalsın.</div><button class="primary" id="sendBtn" type="button">Mənə göndər</button></div>`;
        document.getElementById('sendBtn').onclick = sendResults;
        startHearts();
      }
    }

    document.addEventListener('click', (e) => {
      const play = e.target.closest('#playMusicBtn');
      const silent = e.target.closest('#closeMusicBtn');
      const loveToggle = e.target.closest('[data-love-toggle]');
      const loveBox = document.getElementById('loveBox');

      if(play){ e.preventDefault(); closeMusicPopup(true); return; }
      if(silent){ e.preventDefault(); closeMusicPopup(false); return; }
      if(loveToggle && loveBox){ e.preventDefault(); e.stopPropagation(); loveBox.classList.toggle('open'); return; }
      if(loveBox && !e.target.closest('.love-widget')){ loveBox.classList.remove('open'); }
    });

    render();
  </script>
</body>
</html>
