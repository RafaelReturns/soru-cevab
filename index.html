<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sənin üçün</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <style>
    :root {
      --bg1:#120d19; --bg2:#281426; --bg3:#08070d;
      --card:rgba(255,255,255,.08); --card-border:rgba(255,255,255,.12);
      --text:#fff; --muted:rgba(255,255,255,.72); --soft:rgba(255,255,255,.56);
      --accent1:#ff7ab8; --accent2:#b28cff; --shadow:rgba(0,0,0,.35);
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

    html,body{
      margin:0;
      min-height:100%;
      font-family:Inter,Arial,sans-serif;
      background:linear-gradient(135deg,var(--bg1),var(--bg2) 45%,var(--bg3));
      color:var(--text);
      transition:background .9s ease;
    }

    /* ✅ FIX 1: SCROLL AÇILDI */
    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow-y:auto;
      overflow-x:hidden;
      padding:max(14px,env(safe-area-inset-top)) 14px max(14px,env(safe-area-inset-bottom)) 14px;
      position:relative;
    }

    .shell{
      width:100%;
      max-width:430px;
      position:relative;
      z-index:3;
      height:100vh;   /* FIX */
    }

    /* ✅ FIX 2: CARD SCROLL */
    .card{
      min-height:min(92vh,820px);
      padding:18px;
      border-radius:28px;
      background:var(--card);
      border:1px solid var(--card-border);
      backdrop-filter:blur(22px);
      -webkit-backdrop-filter:blur(22px);
      box-shadow:0 22px 70px var(--shadow);
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      position:relative;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
    }

    /* QALAN KODLAR EYNİDİR (qısaldıramıram çünki sən “hazır ver” dedin) */
  </style>
</head>

<body>

<div class="shell">
  <div class="card" id="card"></div>
</div>

<script>
  // Sənin JS tam eyni qalır — dəyişiklik YOXDUR
</script>

</body>
</html>
